<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Verde | Cadastro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topo">
    <div class="container navbar">
      <h1 class="logo">🌱 Eco Verde</h1>
      <nav>
        <ul class="menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="cadastro.html" class="ativo">Cadastro</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="carrinho.html">Carrinho</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="secao">
    <div class="container">
      <h2 class="titulo-secao">Criar conta</h2>
      <p class="subtitulo">Cadastre-se para acompanhar seus pedidos e receber novidades da fazenda.</p>

      <div class="form-unico">
        <section class="card">
          <h3>Novo cadastro</h3>

          <form id="formCadastro" class="formulario">
            <label>Nome completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>

            <label>E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>

            <label>Senha</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>

            <label>Tipo de perfil</label>
            <select id="tipo">
              <option value="Cliente">Cliente</option>
              <option value="Produtor">Produtor</option>
              <option value="Administrador">Administrador</option>
            </select>

            <p id="mensagem" class="mensagem"></p>

            <button type="submit" class="btn">Criar conta</button>
          </form>

          <p style="margin-top: 16px;">Já tem conta? <a href="login.html" class="link-verde">Faça login aqui.</a></p>
        </section>
      </div>
    </div>
  </main>

  <footer class="rodape">
    <div class="container">
      <p>Projeto Eco Verde - Desenvolvimento Web II</p>
    </div>
  </footer>

  <script src="js/cadastro.js"></script>
</body>
</html>

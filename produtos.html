<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Verde | Produtos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topo">
    <div class="container navbar">
      <h1 class="logo">🌱 Eco Verde</h1>
      <nav>
        <ul class="menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="cadastro.html">Cadastro</a></li>
          <li><a href="produtos.html" class="ativo">Produtos</a></li>
          <li><a href="carrinho.html">Carrinho</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="secao">
    <div class="container">
      <h2 class="titulo-secao">Nossos Produtos</h2>
      <p class="subtitulo">
        Frutas e verduras frescas, cultivadas de forma ecológica no coração da cidade.
        Direto da fazenda para a sua mesa.
      </p>

      <!-- Filtros -->
      <div class="card filtros" style="margin-bottom: 28px;">
        <div class="grid-filtros">
          <div>
            <label>Pesquisar produto</label>
            <input type="text" id="busca" placeholder="Ex: alface, morango, cenoura...">
          </div>
          <div>
            <label>Categoria</label>
            <select id="filtroCategoria">
              <option value="">Todos</option>
              <option value="Fruta">Frutas</option>
              <option value="Verdura">Verduras</option>
              <option value="Legume">Legumes</option>
              <option value="Ervas">Ervas</option>
            </select>
          </div>
        </div>
      </div>

      <!-- lista dos produtos -->
      <div id="listaProdutos" class="grid-produtos"></div>
    </div>
  </main>

  <footer class="rodape">
    <div class="container">
      <p>Projeto Eco Verde - Desenvolvimento Web II</p>
      <p id="ano"></p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/produtos.js"></script>
</body>
</html>
